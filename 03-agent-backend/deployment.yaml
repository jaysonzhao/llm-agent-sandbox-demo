apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-backend
  namespace: llm-sandbox-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-manager
  namespace: llm-sandbox-demo
rules:
  - apiGroups: ["agents.x-k8s.io", "extensions.agents.x-k8s.io"]
    resources: ["sandboxes", "sandboxclaims", "sandboxwarmpools", "sandboxtemplates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-backend-sandbox
  namespace: llm-sandbox-demo
subjects:
  - kind: ServiceAccount
    name: agent-backend
    namespace: llm-sandbox-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sandbox-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-backend
  namespace: llm-sandbox-demo
  labels:
    app: agent-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-backend
  template:
    metadata:
      labels:
        app: agent-backend
    spec:
      serviceAccountName: agent-backend
      containers:
        - name: agent-backend
          image: quay.io/eesposit/agent-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: VERTEX_PROJECT
              value: "itpc-gcp-core-pe-eng-claude"
            - name: VERTEX_REGION
              value: "us-east5"
            - name: MODEL_NAME
              value: "claude-sonnet-4@20250514"
            - name: MAX_TOKENS
              value: "4096"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/etc/gcp/application_default_credentials.json"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          volumeMounts:
            - name: gcp-creds
              mountPath: /etc/gcp
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10
      volumes:
        - name: gcp-creds
          secret:
            secretName: gcp-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: agent-backend
  namespace: llm-sandbox-demo
  labels:
    app: agent-backend
spec:
  selector:
    app: agent-backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
