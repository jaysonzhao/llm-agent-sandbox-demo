<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Sandbox Chat</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --surface: #f4f4f4;
  --surface-hover: #ebebeb;
  --border: #e5e5e5;
  --text: #1a1a1a;
  --text-muted: #6b6b6b;
  --user-bg: #f0f0f0;
  --code-bg: #1e1e2e;
  --code-header-bg: #2b2b3d;
  --code-header-text: #b0b0c0;
  --success: #16a34a;
  --error: #dc2626;
  --run-bg: #2563eb;
  --run-hover: #1d4ed8;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

header {
  padding: 14px 24px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

header h1 {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
}

header .status {
  font-size: 12px;
  color: var(--text-muted);
  margin-left: auto;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 0;
  display: flex;
  flex-direction: column;
  gap: 24px;
  background: var(--bg);
}

.message {
  max-width: 780px;
  width: 100%;
  margin: 0 auto;
  padding: 0 24px;
  line-height: 1.7;
  font-size: 15px;
}

.message.user {
  align-self: center;
  white-space: pre-wrap;
  padding: 12px 20px;
  background: var(--user-bg);
  border-radius: 20px;
  max-width: 780px;
  color: var(--text);
}

.message.assistant {
  align-self: center;
}

.message.assistant .content {
  padding: 4px 0;
}

.message.assistant .content > *:first-child { margin-top: 0; }
.message.assistant .content > *:last-child { margin-bottom: 0; }

.message.assistant .content p { margin: 10px 0; }
.message.assistant .content ul,
.message.assistant .content ol { margin: 10px 0; padding-left: 28px; }
.message.assistant .content li { margin: 4px 0; }
.message.assistant .content h1,
.message.assistant .content h2,
.message.assistant .content h3 { margin: 20px 0 10px; font-weight: 600; }
.message.assistant .content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
.message.assistant .content blockquote {
  border-left: 3px solid var(--border);
  padding-left: 16px;
  color: var(--text-muted);
  margin: 10px 0;
}
.message.assistant .content table { border-collapse: collapse; margin: 10px 0; width: 100%; }
.message.assistant .content th,
.message.assistant .content td {
  border: 1px solid var(--border);
  padding: 8px 14px;
  text-align: left;
}
.message.assistant .content th { background: var(--surface); font-weight: 600; }

.message.assistant .content code:not(pre code) {
  background: var(--surface);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  color: #c7254e;
}

.code-block {
  margin: 14px 0;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #2b2b3d;
}

.code-header {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  background: var(--code-header-bg);
  font-size: 12px;
  color: var(--code-header-text);
}

.code-header .lang {
  text-transform: lowercase;
  font-weight: 500;
}

.code-header .actions {
  margin-left: auto;
  display: flex;
  gap: 4px;
}

.code-header button {
  border: none;
  background: none;
  color: var(--code-header-text);
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all 0.15s;
}

.code-header button:hover {
  background: rgba(255,255,255,0.08);
  color: #e0e0e0;
}

.code-header .run-btn {
  background: var(--run-bg);
  color: #fff;
  font-weight: 600;
}

.code-header .run-btn:hover {
  background: var(--run-hover);
}

.code-header .run-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.code-block pre {
  margin: 0;
  padding: 16px;
  overflow-x: auto;
  background: var(--code-bg);
}

.code-block pre code {
  font-size: 13px;
  line-height: 1.6;
  font-family: "Fira Code", "JetBrains Mono", Menlo, Monaco, "Courier New", monospace;
  color: #d4d4d4;
}

.code-output {
  border-top: 1px solid #383850;
  padding: 14px 16px;
  font-family: "Fira Code", "JetBrains Mono", Menlo, Monaco, monospace;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 400px;
  overflow-y: auto;
  color: #d4d4d4;
  background: #141422;
}

.code-output.success { background: #0f1f15; }
.code-output.error { background: #1f0f0f; }

.code-output .output-header {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.code-output.success .output-header { color: #4ade80; }
.code-output.error .output-header { color: #f87171; }

.code-output .spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid #383850;
  border-top-color: var(--run-bg);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.thinking {
  max-width: 780px;
  width: 100%;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-muted);
  font-size: 14px;
}

.thinking .dots span {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: bounce 1.4s ease-in-out infinite;
}

.thinking .dots span:nth-child(2) { animation-delay: 0.16s; }
.thinking .dots span:nth-child(3) { animation-delay: 0.32s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

#input-area {
  padding: 16px 24px 24px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

#input-area form {
  display: flex;
  gap: 12px;
  max-width: 780px;
  margin: 0 auto;
}

#input-area textarea {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 18px;
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  resize: none;
  min-height: 24px;
  max-height: 200px;
  line-height: 1.5;
  transition: border-color 0.15s;
}

#input-area textarea:focus {
  outline: none;
  border-color: #999;
}

#input-area textarea::placeholder { color: var(--text-muted); }

#input-area button[type="submit"] {
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 16px;
  padding: 0 22px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
  flex-shrink: 0;
}

#input-area button[type="submit"]:hover { opacity: 0.8; }
#input-area button[type="submit"]:disabled { opacity: 0.3; cursor: not-allowed; }

#messages:empty::after {
  content: "Ask me to write some code \2014 I can run it in a sandbox!";
  color: var(--text-muted);
  font-size: 20px;
  font-weight: 300;
  text-align: center;
  margin: auto;
}
</style>
</head>
<body>
<header>
  <h1>LLM Sandbox Chat</h1>
  <span class="status" id="status"></span>
</header>

<div id="messages"></div>

<div id="input-area">
  <form id="chat-form">
    <textarea id="user-input" placeholder="Send a message..." rows="1"></textarea>
    <button type="submit" id="send-btn">Send</button>
  </form>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
const messagesEl = document.getElementById('messages');
const form = document.getElementById('chat-form');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const statusEl = document.getElementById('status');

const SYSTEM_MESSAGE = {
  role: 'system',
  content: 'You are a helpful coding assistant. When asked to write code, always show it '
    + 'in a fenced markdown code block with the language tag (e.g. ```python). '
    + 'Do NOT pretend to execute code or show fake output. Just show the code. '
    + 'The user has a Run button to execute it themselves. '
    + 'Available languages: Python (with numpy, pandas, scipy, sympy, matplotlib, scikit-learn), Bash, JavaScript.'
};
const history = [];
let streaming = false;

const renderer = new marked.Renderer();

renderer.code = function(code, lang) {
  code = code.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
  const language = (lang || '').toLowerCase() || 'text';
  let highlighted;
  try {
    highlighted = (lang && hljs.getLanguage(lang))
      ? hljs.highlight(code, { language: lang }).value
      : hljs.highlightAuto(code).value;
  } catch {
    highlighted = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  const runnable = ['python', 'py', 'bash', 'sh', 'shell', 'javascript', 'js'].includes(language);
  const escapedCode = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  const runBtn = runnable
    ? '<button class="run-btn" data-lang="' + language + '">&#9654; Run</button>'
    : '';

  return '<div class="code-block">'
    + '<div class="code-header">'
    + '<span class="lang">' + language + '</span>'
    + '<div class="actions">'
    + '<button class="copy-btn">Copy</button>'
    + runBtn
    + '</div></div>'
    + '<pre><code data-code="' + escapedCode + '">' + highlighted + '</code></pre>'
    + '</div>';
};

marked.setOptions({ renderer: renderer, breaks: true });

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

input.addEventListener('input', () => autoResize(input));

function handleSend() {
  const text = input.value.trim();
  if (!text || streaming) return;
  sendMessage(text);
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

form.addEventListener('submit', (e) => {
  e.preventDefault();
  handleSend();
});

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `message ${role}`;

  if (role === 'assistant') {
    const contentDiv = document.createElement('div');
    contentDiv.className = 'content';
    contentDiv.innerHTML = marked.parse(content);
    div.appendChild(contentDiv);
  } else {
    div.textContent = content;
  }

  messagesEl.appendChild(div);
  scrollToBottom();
  return div;
}

function addThinking() {
  const div = document.createElement('div');
  div.className = 'thinking';
  div.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  messagesEl.appendChild(div);
  scrollToBottom();
  return div;
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage(text) {
  streaming = true;
  sendBtn.disabled = true;
  input.value = '';
  autoResize(input);

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  const thinkingEl = addThinking();
  statusEl.textContent = 'Thinking...';

  try {
    const resp = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4@20250514',
        messages: [SYSTEM_MESSAGE, ...history],
        stream: true,
      }),
    });

    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${errText}`);
    }

    thinkingEl.remove();

    const assistantDiv = document.createElement('div');
    assistantDiv.className = 'message assistant';
    const contentDiv = document.createElement('div');
    contentDiv.className = 'content';
    assistantDiv.appendChild(contentDiv);
    messagesEl.appendChild(assistantDiv);

    let fullText = '';
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') continue;

        try {
          const chunk = JSON.parse(data);
          const delta = chunk.choices?.[0]?.delta;
          if (delta?.content) {
            fullText += delta.content;
            contentDiv.innerHTML = marked.parse(fullText);
            scrollToBottom();
          }
        } catch {}
      }
    }

    contentDiv.innerHTML = marked.parse(fullText);
    history.push({ role: 'assistant', content: fullText });
    statusEl.textContent = '';
  } catch (err) {
    thinkingEl.remove();
    addMessage('assistant', `**Error:** ${err.message}`);
    statusEl.textContent = 'Error';
  } finally {
    streaming = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

document.addEventListener('click', (e) => {
  const copyBtn = e.target.closest('.copy-btn');
  if (copyBtn) { copyCode(copyBtn); return; }
  const runBtn = e.target.closest('.run-btn');
  if (runBtn && !runBtn.disabled) { runCode(runBtn, runBtn.getAttribute('data-lang')); }
});

function copyCode(btn) {
  const codeEl = btn.closest('.code-block').querySelector('code');
  const code = decodeHTML(codeEl.getAttribute('data-code'));
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}

async function runCode(btn, language) {
  const block = btn.closest('.code-block');
  const codeEl = block.querySelector('code');
  const code = decodeHTML(codeEl.getAttribute('data-code'));

  const langMap = { py: 'python', js: 'javascript', sh: 'bash', shell: 'bash' };
  const lang = langMap[language] || language;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:12px;height:12px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:4px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;"></span>Running...';

  let existing = block.querySelector('.code-output');
  if (existing) existing.remove();

  const outputDiv = document.createElement('div');
  outputDiv.className = 'code-output';
  outputDiv.innerHTML = '<span class="spinner"></span> Running in sandbox...';
  block.appendChild(outputDiv);
  scrollToBottom();

  try {
    const resp = await fetch('/v1/sandbox/execute', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ language: lang, code }),
    });

    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${errText}`);
    }

    const result = await resp.json();
    const isError = result.exit_code !== 0;

    outputDiv.className = `code-output ${isError ? 'error' : 'success'}`;

    let html = `<div class="output-header">${isError ? 'Error' : 'Output'} (exit code ${result.exit_code})</div>`;
    if (result.stdout) html += escapeHTML(result.stdout);
    if (result.stderr) {
      if (result.stdout) html += '\n';
      html += `<span style="color:var(--error)">${escapeHTML(result.stderr)}</span>`;
    }
    if (!result.stdout && !result.stderr) html += '<span style="color:var(--text-muted)">(no output)</span>';

    outputDiv.innerHTML = html;
  } catch (err) {
    outputDiv.className = 'code-output error';
    outputDiv.innerHTML = `<div class="output-header">Error</div>${escapeHTML(err.message)}`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '&#9654; Run';
    scrollToBottom();
  }
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function decodeHTML(str) {
  const ta = document.createElement('textarea');
  ta.innerHTML = str;
  return ta.value;
}

input.focus();
</script>
</body>
</html>
