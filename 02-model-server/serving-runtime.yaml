apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-runtime
  namespace: llm-sandbox-demo
  annotations:
    openshift.io/display-name: "vLLM Serving Runtime"
    opendatahub.io/template-name: "vllm-runtime"
    opendatahub.io/template-display-name: "vLLM Serving Runtime"
  labels:
    opendatahub.io/dashboard: "true"
spec:
  annotations:
    prometheus.io/port: "8080"
    prometheus.io/path: /metrics
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
  containers:
    - name: kserve-container
      image: vllm/vllm-openai-cpu:latest
      command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name={{.Name}}
        - --max-model-len=4096
        - --dtype=bfloat16
        - --enforce-eager
        - --gpu-memory-utilization=0.3
        - --enable-auto-tool-choice
        - --tool-call-parser=granite
      env:
        - name: HF_HUB_OFFLINE
          value: "0"
        - name: USER
          value: "vllm"
        - name: HOME
          value: "/tmp"
        - name: VLLM_TARGET_DEVICE
          value: "cpu"
      ports:
        - containerPort: 8080
          protocol: TCP
      resources:
        requests:
          cpu: "2"
          memory: 16Gi
        limits:
          cpu: "4"
          memory: 24Gi
