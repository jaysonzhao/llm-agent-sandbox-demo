apiVersion: v1
kind: Service
metadata:
  name: chat-ui
  namespace: web-ui
spec:
  selector:
    app: chat-ui
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-ui
  namespace: web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-ui
  template:
    metadata:
      labels:
        app: chat-ui
    spec:
      containers:
      - name: nginx
        image: docker.io/nginxinc/nginx-unprivileged:1.27-alpine
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
          readOnly: true
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
          readOnly: true
      volumes:
      - name: html
        configMap:
          name: chat-ui-files
          items:
          - key: index.html
            path: index.html
      - name: nginx-conf
        configMap:
          name: chat-ui-files
          items:
          - key: nginx.conf
            path: nginx.conf
---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: chat-ui
  namespace: web-ui
spec:
  to:
    kind: Service
    name: chat-ui
    weight: 100
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
